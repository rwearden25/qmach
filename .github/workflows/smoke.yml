name: smoke

# Catches the "I broke server.js with a typo" class of failures before they
# reach Railway. Deliberately minimal — no env vars, no DB, no Anthropic key —
# so it's truly zero-decision. If the parse passes and the app boots far
# enough to hit the SQLite init, that covers ~80% of what auto-deploy can
# break. Expand later (start the server + curl /health) when worth the setup.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Syntax-check server.js
        run: node -c server.js

      - name: Syntax-check helper modules
        run: |
          node -c db/database.js
          node -c db/kb.js
          node -c db/backup.js
