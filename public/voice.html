<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>pquote — Field Transmission</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;0,6..96,800;0,6..96,900;1,6..96,700;1,6..96,800&family=JetBrains+Mono:wght@400;500;700&family=Oswald:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/voice.css">
</head>
<body>

<!-- ─── Frame ─── -->
<div class="grain" aria-hidden="true"></div>
<div class="scanlines" aria-hidden="true"></div>

<header class="frame-header">
  <a href="/" class="brand">
    <span class="brand-mark">pquote</span>
    <span class="brand-sub">/ field transmission</span>
  </a>
  <div class="status-strip" id="status-strip">
    <span class="status-dot" data-state="idle"></span>
    <span class="status-text" id="status-text">OFFLINE</span>
  </div>
</header>

<!-- ═══════════════════════════════════════════════════════
     SCREEN 1 — TRANSMISSION
═══════════════════════════════════════════════════════ -->
<main class="screen active" id="screen-mic">

  <div class="q-monogram" aria-hidden="true">Q<span class="q-period">.</span></div>

  <div class="prompt-wrap">
    <p class="prompt-eyebrow">CH-01 · OPEN MIC</p>
    <h1 class="prompt-line">Tell <em>Q</em> about the job.</h1>
    <p class="prompt-help">Press the mic. Speak naturally. Q listens, parses, and returns a quote.</p>
  </div>

  <div class="mic-stage">
    <button id="mic-btn" type="button" class="mic-btn" aria-label="Tap to talk">
      <span class="mic-rings" aria-hidden="true">
        <span></span><span></span><span></span>
      </span>
      <svg class="mic-icon" viewBox="0 0 64 96" aria-hidden="true">
        <!-- Vintage broadcast mic silhouette -->
        <rect x="22" y="8" width="20" height="46" rx="10" fill="currentColor"/>
        <path d="M14 42c0 11 8 20 18 20s18-9 18-20" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <line x1="32" y1="62" x2="32" y2="78" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <line x1="20" y1="78" x2="44" y2="78" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <!-- Grille details -->
        <line x1="26" y1="18" x2="38" y2="18" stroke="rgba(0,0,0,.35)" stroke-width="1.5"/>
        <line x1="26" y1="24" x2="38" y2="24" stroke="rgba(0,0,0,.35)" stroke-width="1.5"/>
        <line x1="26" y1="30" x2="38" y2="30" stroke="rgba(0,0,0,.35)" stroke-width="1.5"/>
        <line x1="26" y1="36" x2="38" y2="36" stroke="rgba(0,0,0,.35)" stroke-width="1.5"/>
        <line x1="26" y1="42" x2="38" y2="42" stroke="rgba(0,0,0,.35)" stroke-width="1.5"/>
      </svg>
      <span class="mic-label" id="mic-label">PRESS TO TX</span>
    </button>
  </div>

  <section class="readout">
    <div class="readout-head">
      <span class="readout-label">[ TRANSCRIPT ]</span>
      <span class="readout-meter" id="readout-meter">— — —</span>
    </div>
    <canvas id="waveform" class="waveform" width="800" height="60" aria-hidden="true"></canvas>
    <div id="transcript" class="transcript" aria-live="polite"></div>
    <textarea id="transcript-fallback" class="transcript-fallback hidden" placeholder="Mic unavailable. Type the job here…" rows="4"></textarea>
    <div class="readout-foot">
      <span id="mic-status" class="mic-status"></span>
      <button id="submit-btn" type="button" class="tx-btn hidden">
        <span>TRANSMIT</span>
        <span class="tx-arrow">→</span>
      </button>
    </div>
  </section>

  <footer class="screen-footer">
    <span>FREQ 2026.04 · DFW</span>
    <span>OP: <span id="op-id">—</span></span>
  </footer>
</main>

<!-- ═══════════════════════════════════════════════════════
     SCREEN 2 — LOG ENTRY
═══════════════════════════════════════════════════════ -->
<main class="screen" id="screen-result">
  <div id="result-card" class="log-entry"></div>
</main>

<script src="/js/voice.js"></script>
</body>
</html>
