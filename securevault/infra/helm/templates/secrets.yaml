apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-external-secret
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-secrets
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.secrets.storeName }}
    kind: {{ .Values.secrets.storeKind }}
  target:
    name: {{ .Values.secrets.secretName }}
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    # ── Database ────────────────────────────────────────────────────────────────
    - secretKey: DATABASE_URL
      remoteRef:
        key: {{ .Values.secrets.remoteRefPrefix }}database-url
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ .Values.secrets.remoteRefPrefix }}db-password

    # ── Redis ───────────────────────────────────────────────────────────────────
    - secretKey: REDIS_URL
      remoteRef:
        key: {{ .Values.secrets.remoteRefPrefix }}redis-url

    # ── JWT (RS256 key pair) ─────────────────────────────────────────────────────
    - secretKey: JWT_PRIVATE_KEY
      remoteRef:
        key: {{ .Values.secrets.remoteRefPrefix }}jwt-private-key
    - secretKey: JWT_PUBLIC_KEY
      remoteRef:
        key: {{ .Values.secrets.remoteRefPrefix }}jwt-public-key

    # ── Object Storage ───────────────────────────────────────────────────────────
    - secretKey: S3_ACCESS_KEY
      remoteRef:
        key: {{ .Values.secrets.remoteRefPrefix }}s3-access-key
    - secretKey: S3_SECRET_KEY
      remoteRef:
        key: {{ .Values.secrets.remoteRefPrefix }}s3-secret-key
    - secretKey: S3_ENDPOINT
      remoteRef:
        key: {{ .Values.secrets.remoteRefPrefix }}s3-endpoint

    # ── TOTP encryption ──────────────────────────────────────────────────────────
    - secretKey: TOTP_ENCRYPTION_KEY
      remoteRef:
        key: {{ .Values.secrets.remoteRefPrefix }}totp-encryption-key
