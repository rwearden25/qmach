apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-config
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  # ── Application ────────────────────────────────────────────────────────────
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  APP_URL: {{ .Values.config.appUrl | quote }}
  API_URL: {{ .Values.config.apiUrl | quote }}

  # ── Database (non-secret connection parameters) ────────────────────────────
  DB_HOST: {{ .Values.database.host | quote }}
  DB_PORT: {{ .Values.database.port | toString | quote }}
  DB_NAME: {{ .Values.database.name | quote }}
  DB_USER: {{ .Values.database.user | quote }}

  # ── Redis ───────────────────────────────────────────────────────────────────
  REDIS_HOST: {{ .Values.redis.host | quote }}
  REDIS_PORT: {{ .Values.redis.port | toString | quote }}

  # ── Object Storage ───────────────────────────────────────────────────────────
  S3_BUCKET: {{ .Values.config.s3Bucket | quote }}
  S3_REGION: {{ .Values.config.s3Region | quote }}
  S3_FORCE_PATH_STYLE: {{ .Values.config.s3ForcePathStyle | quote }}

  # ── TOTP ─────────────────────────────────────────────────────────────────────
  TOTP_ISSUER: {{ .Values.config.totpIssuer | quote }}

  # ── JWT expiry (non-secret) ──────────────────────────────────────────────────
  JWT_ACCESS_EXPIRY: "15m"
  JWT_REFRESH_EXPIRY: "7d"
